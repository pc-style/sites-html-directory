<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miau-spaniały Dzień</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&family=Shrikhand&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffd1dc; /* Pastel pink */
            --card-bg: rgba(255, 255, 255, 0.6);
            --text-color: #5d4037; /* Warm brown */
            --accent-color: #ffb7b2;
            --paw-color: rgba(255, 255, 255, 0.4);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #ffd1dc 0%, #ffb7b2 100%);
            font-family: 'Mali', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        /* SVG Noise Overlay */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.4;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 3rem;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1),
                        inset 0 0 0 2px rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 10;
            transform: translateY(50px);
            opacity: 0;
            animation: slideUp 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .cat-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
        }

        h1 {
            font-family: 'Shrikhand', cursive;
            font-size: 2.5rem;
            margin: 0 0 1rem 0;
            color: #ff6b6b;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
            letter-spacing: 2px;
        }

        p {
            font-size: 1.4rem;
            line-height: 1.6;
            margin: 0;
            font-weight: 600;
        }

        .signature {
            display: block;
            margin-top: 2rem;
            font-size: 1.2rem;
            font-style: italic;
            opacity: 0.8;
        }

        /* Floating paws background */
        .paws {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 1;
        }

        .paw {
            position: absolute;
            color: var(--paw-color);
            font-size: 3rem;
            opacity: 0;
            animation: floatUp 15s linear infinite;
        }

        .paw:nth-child(1) { left: 10%; animation-delay: 0s; transform: rotate(-20deg); font-size: 4rem; }
        .paw:nth-child(2) { left: 30%; animation-delay: 4s; transform: rotate(15deg); font-size: 2.5rem; }
        .paw:nth-child(3) { left: 50%; animation-delay: 2s; transform: rotate(-10deg); font-size: 5rem; }
        .paw:nth-child(4) { left: 70%; animation-delay: 6s; transform: rotate(25deg); font-size: 3.5rem; }
        .paw:nth-child(5) { left: 90%; animation-delay: 1s; transform: rotate(-15deg); font-size: 4.5rem; }

        @keyframes slideUp {
            from { transform: translateY(50px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* Interactive yarn ball */
        .yarn {
            position: absolute;
            bottom: -20px;
            right: -20px;
            font-size: 4rem;
            cursor: pointer;
            transition: transform 0.3s;
            z-index: 20;
        }

        .yarn:hover {
            transform: scale(1.1) rotate(15deg);
        }
    </style>
</head>
<body>
    <div class="noise"></div>

    <div class="paws">
        <div class="paw">🐾</div>
        <div class="paw">🐾</div>
        <div class="paw">🐾</div>
        <div class="paw">🐾</div>
        <div class="paw">🐾</div>
    </div>

    <div class="card">
        <div class="cat-icon">🐱</div>
        <h1>Miau-spaniałego Dnia!</h1>
        <p>Niech Twój dzień będzie tak ciepły, przytulny i beztroski, jak brzuszek mruczącego kotka śpiącego na kaloryferze.</p>
        <span class="signature">Pamiętaj, by czasem się przeciągnąć! ✨</span>
        <div class="yarn">🧶</div>
    </div>

    <script>
        // Simple interaction: click the yarn to make it bounce away
        const yarn = document.querySelector('.yarn');
        yarn.addEventListener('click', () => {
            yarn.style.transition = 'transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            yarn.style.transform = `translate(${Math.random() * 200 - 100}px, ${Math.random() * 200 - 100}px) rotate(${Math.random() * 360}deg)`;

            setTimeout(() => {
                yarn.style.transform = '';
            }, 1000);
        });
    </script>
</body>
</html>
