<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dzień dobry, kocie! 🌅</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=Shrikhand&display=swap");

      :root {
        --dawn-sky: #b5c6e0;
        --dawn-pink: #f2c6d4;
        --dawn-peach: #f9d8b7;
        --dawn-gold: #fde8b1;
        --text-deep: #4a3b5c;
        --text-soft: #6d5b7f;
        --cloud-white: #ffffff;
        --cloud-shadow: #e0e5ec;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          var(--dawn-sky) 0%,
          var(--dawn-pink) 40%,
          var(--dawn-peach) 80%,
          var(--dawn-gold) 100%
        );
        background-size: 300% 300%;
        animation: dawnBreathe 15s ease infinite alternate;
        font-family: "Comfortaa", cursive, sans-serif;
        color: var(--text-deep);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      /* Noise Overlay */
      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.08;
        z-index: 1;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      @keyframes dawnBreathe {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* Container */
      .container {
        position: relative;
        z-index: 10;
        max-width: 600px;
        padding: 3rem;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }

      /* Cat & Cloud Scene */
      .scene {
        position: relative;
        width: 250px;
        height: 250px;
        animation: floatCat 4s ease-in-out infinite;
      }

      @keyframes floatCat {
        0%, 100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      /* The Cloud */
      .cloud {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 160px;
        height: 60px;
        background: var(--cloud-white);
        border-radius: 50px;
        box-shadow:
          0 15px 30px rgba(74, 59, 92, 0.1),
          inset 0 -10px 20px var(--cloud-shadow);
      }

      .cloud::before,
      .cloud::after {
        content: "";
        position: absolute;
        background: var(--cloud-white);
        border-radius: 50%;
        box-shadow: inset 0 -5px 10px var(--cloud-shadow);
      }

      .cloud::before {
        width: 80px;
        height: 80px;
        top: -40px;
        left: 20px;
      }

      .cloud::after {
        width: 60px;
        height: 60px;
        top: -25px;
        right: 25px;
      }

      /* The Cat */
      .cat {
        position: absolute;
        bottom: 65px;
        left: 50%;
        transform: translateX(-50%);
        width: 100px;
        height: 90px;
        background: var(--cloud-white);
        border-radius: 50px 50px 40px 40px;
        z-index: 2;
        box-shadow: inset -5px -5px 15px var(--cloud-shadow);
        animation: squishCat 4s ease-in-out infinite;
      }

      @keyframes squishCat {
        0%, 100% {
          transform: translateX(-50%) scaleY(1) scaleX(1);
        }
        50% {
          transform: translateX(-50%) scaleY(0.95) scaleX(1.05);
        }
      }

      /* Ears */
      .cat::before,
      .cat::after {
        content: "";
        position: absolute;
        top: -15px;
        width: 0;
        height: 0;
        border-left: 20px solid transparent;
        border-right: 20px solid transparent;
        border-bottom: 35px solid var(--cloud-white);
      }

      .cat::before {
        left: -5px;
        transform: rotate(-15deg);
      }

      .cat::after {
        right: -5px;
        transform: rotate(15deg);
      }

      /* Inner Ears */
      .ear-inner-l,
      .ear-inner-r {
        position: absolute;
        top: -6px;
        width: 0;
        height: 0;
        border-left: 10px solid transparent;
        border-right: 10px solid transparent;
        border-bottom: 20px solid var(--dawn-pink);
        z-index: 3;
      }
      .ear-inner-l {
        left: 6px;
        transform: rotate(-15deg);
      }
      .ear-inner-r {
        right: 6px;
        transform: rotate(15deg);
      }

      /* Face */
      .face {
        position: absolute;
        top: 35px;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 4;
      }

      /* Eyes */
      .eye {
        position: absolute;
        top: 0;
        width: 18px;
        height: 4px;
        background: var(--text-deep);
        border-radius: 4px;
      }

      .eye.left {
        left: 25px;
        transform: rotate(10deg);
      }

      .eye.right {
        right: 25px;
        transform: rotate(-10deg);
      }

      /* Blush */
      .blush {
        position: absolute;
        top: 10px;
        width: 16px;
        height: 8px;
        background: var(--dawn-pink);
        border-radius: 50%;
        opacity: 0.7;
      }

      .blush.left {
        left: 15px;
      }

      .blush.right {
        right: 15px;
      }

      /* Nose */
      .nose {
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 8px;
        height: 6px;
        background: var(--dawn-pink);
        border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
      }

      /* Mouth */
      .mouth {
        position: absolute;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        width: 16px;
        height: 8px;
      }

      .mouth::before,
      .mouth::after {
        content: "";
        position: absolute;
        width: 8px;
        height: 6px;
        border-bottom: 2px solid var(--text-deep);
        border-radius: 50%;
      }

      .mouth::before {
        left: 0;
        border-left: 2px solid var(--text-deep);
        border-top-left-radius: 0;
        transform: rotate(-30deg);
      }

      .mouth::after {
        right: 0;
        border-right: 2px solid var(--text-deep);
        border-top-right-radius: 0;
        transform: rotate(30deg);
      }

      /* Content */
      .content {
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 2.5rem;
        border-radius: 30px;
        border: 2px solid rgba(255, 255, 255, 0.6);
        box-shadow:
          0 20px 40px rgba(74, 59, 92, 0.08),
          inset 0 0 20px rgba(255, 255, 255, 0.5);
        transform: translateY(20px);
        opacity: 0;
        animation: revealUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.5s;
      }

      @keyframes revealUp {
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      h1 {
        font-family: "Shrikhand", serif;
        font-size: 2.8rem;
        line-height: 1.2;
        margin-bottom: 1rem;
        background: linear-gradient(to right, var(--text-deep), #8c6a99);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 2px 2px 10px rgba(255,255,255,0.8);
      }

      p {
        font-size: 1.15rem;
        line-height: 1.7;
        color: var(--text-soft);
        font-weight: 600;
        max-width: 450px;
        margin: 0 auto;
      }

      /* Sparkles */
      .sparkles {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 5;
      }

      .sparkle {
        position: absolute;
        width: 10px;
        height: 10px;
        background: var(--cloud-white);
        border-radius: 50%;
        filter: blur(2px);
        animation: twinkle var(--dur, 3s) ease-in-out infinite alternate;
      }

      @keyframes twinkle {
        0% { transform: scale(0); opacity: 0; }
        50% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(0); opacity: 0; }
      }

      /* Generate a few sparkles via nth-child */
      .sparkle:nth-child(1) { top: 20%; left: 15%; --dur: 2s; animation-delay: 0.1s; }
      .sparkle:nth-child(2) { top: 15%; left: 80%; --dur: 3s; animation-delay: 0.7s; }
      .sparkle:nth-child(3) { top: 60%; left: 10%; --dur: 2.5s; animation-delay: 1.2s; }
      .sparkle:nth-child(4) { top: 75%; left: 85%; --dur: 4s; animation-delay: 0.4s; }
      .sparkle:nth-child(5) { top: 40%; left: 90%; --dur: 3.5s; animation-delay: 1.5s; }
      .sparkle:nth-child(6) { top: 85%; left: 20%; --dur: 2.8s; animation-delay: 0.9s; }
      .sparkle:nth-child(7) { top: 10%; left: 45%; --dur: 2.2s; animation-delay: 0.3s; }

      /* Sun element */
      .sun {
        position: absolute;
        top: 10%;
        right: 15%;
        width: 120px;
        height: 120px;
        background: radial-gradient(circle, var(--dawn-gold) 0%, rgba(253,232,177,0) 70%);
        border-radius: 50%;
        z-index: 0;
        filter: blur(10px);
        animation: pulseSun 8s ease-in-out infinite alternate;
      }

      @keyframes pulseSun {
        0% { transform: scale(1); opacity: 0.6; }
        100% { transform: scale(1.2); opacity: 1; }
      }

      @media (max-width: 600px) {
        h1 { font-size: 2.2rem; }
        p { font-size: 1rem; }
        .container { padding: 1.5rem; }
      }
    </style>
  </head>
  <body>
    <div class="sun"></div>
    <div class="sparkles" aria-hidden="true">
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
    </div>

    <div class="container">
      <div class="scene">
        <div class="cat">
          <div class="ear-inner-l"></div>
          <div class="ear-inner-r"></div>
          <div class="face">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="blush left"></div>
            <div class="blush right"></div>
            <div class="nose"></div>
            <div class="mouth"></div>
          </div>
        </div>
        <div class="cloud"></div>
      </div>

      <div class="content">
        <h1>Dzień dobry, kocie!</h1>
        <p>
          Słońce już wstaje, a to oznacza czas na poranne, leniwe przeciąganie! Niech ten dzień przyniesie Ci mnóstwo ciepełka, pysznych smakołyków i powodów do głośnego mruczenia.
        </p>
      </div>
    </div>
  </body>
</html>
