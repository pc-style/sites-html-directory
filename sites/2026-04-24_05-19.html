<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mruczący Dzień</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=Delius&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-top: #ffecd2;
            --bg-bottom: #fcb69f;
            --text-main: #6b4c3a;
            --card-glass: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.9);
            --accent-paw: #ff9a9e;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Abstract background shapes */
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            z-index: -1;
            animation: float 20s infinite ease-in-out alternate;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: rgba(255, 182, 193, 0.6);
            top: 10%;
            left: 15%;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: rgba(255, 218, 185, 0.5);
            bottom: -5%;
            right: 10%;
            animation-delay: -5s;
        }

        .shape-3 {
            width: 250px;
            height: 250px;
            background: rgba(255, 255, 255, 0.8);
            top: 40%;
            left: 50%;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(50px, 30px) rotate(10deg); }
            100% { transform: translate(-30px, -50px) rotate(-5deg); }
        }

        .card-container {
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--card-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid var(--card-border);
            border-radius: 40px;
            padding: 60px 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            position: relative;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Cat Ears */
        .ear {
            position: absolute;
            top: -30px;
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 50px solid var(--card-border);
            z-index: -1;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .ear::after {
            content: '';
            position: absolute;
            top: 15px;
            left: -15px;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 30px solid rgba(255, 154, 158, 0.4);
        }

        .ear-left {
            left: 40px;
            transform: rotate(-15deg);
            transform-origin: bottom right;
        }

        .ear-right {
            right: 40px;
            transform: rotate(15deg);
            transform-origin: bottom left;
        }

        .card:hover .ear-left {
            transform: rotate(-25deg);
        }

        .card:hover .ear-right {
            transform: rotate(25deg);
        }

        h1 {
            font-family: 'Delius', cursive;
            color: var(--accent-paw);
            font-size: 2.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
        }

        p {
            color: var(--text-main);
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .paw-print {
            display: inline-block;
            font-size: 2rem;
            color: var(--accent-paw);
            animation: wave 2s infinite;
            transform-origin: bottom center;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
        }

        /* Whiskers */
        .whiskers {
            position: absolute;
            top: 50%;
            width: 100%;
            height: 20px;
            pointer-events: none;
            opacity: 0.3;
        }

        .whisker {
            position: absolute;
            height: 2px;
            width: 60px;
            background: var(--text-main);
            border-radius: 2px;
        }

        .whisker.left-1 { left: -20px; transform: rotate(10deg); }
        .whisker.left-2 { left: -25px; top: 10px; transform: rotate(0deg); }
        .whisker.left-3 { left: -20px; top: 20px; transform: rotate(-10deg); }

        .whisker.right-1 { right: -20px; transform: rotate(-10deg); }
        .whisker.right-2 { right: -25px; top: 10px; transform: rotate(0deg); }
        .whisker.right-3 { right: -20px; top: 20px; transform: rotate(10deg); }

        .cat-face {
            font-size: 3rem;
            color: var(--text-main);
            margin-top: 10px;
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        .card:hover .cat-face {
            transform: scale(1.1);
        }

        /* Interactive yarn ball */
        .yarn-ball {
            position: absolute;
            bottom: 20px;
            right: 30px;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #ff9a9e, #fecfef);
            border-radius: 50%;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.1), 0 5px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 20;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Strings on the yarn ball */
        .yarn-ball::before, .yarn-ball::after {
            content: '';
            position: absolute;
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 50%;
        }

        .yarn-ball::before {
            top: 5px; left: 10px; width: 20px; height: 30px; transform: rotate(30deg);
        }

        .yarn-ball::after {
            top: 10px; left: 5px; width: 30px; height: 20px; transform: rotate(-20deg);
        }

        .yarn-string {
            position: absolute;
            bottom: 20px;
            right: 65px;
            width: 0;
            height: 2px;
            background: #ff9a9e;
            border-radius: 2px;
            transform-origin: right center;
            opacity: 0;
            transition: width 0.5s ease, opacity 0.2s ease;
        }

        .yarn-ball:active {
            transform: translateX(-100px) rotate(-360deg);
        }

        .yarn-ball:active + .yarn-string {
            width: 100px;
            opacity: 1;
        }

        /* Floating paws in background */
        .bg-paw {
            position: absolute;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.4);
            z-index: 1;
            animation: rise 15s infinite linear;
        }

        @keyframes rise {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>

    <!-- Background paws generated via JS for simplicity -->
    <script>
        for(let i=0; i<15; i++) {
            let paw = document.createElement('div');
            paw.className = 'bg-paw';
            paw.innerHTML = '🐾';
            paw.style.left = Math.random() * 100 + 'vw';
            paw.style.animationDuration = (Math.random() * 10 + 10) + 's';
            paw.style.animationDelay = (Math.random() * 15) + 's';
            paw.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
            document.body.appendChild(paw);
        }
    </script>

    <div class="card-container">
        <div class="card">
            <div class="ear ear-left"></div>
            <div class="ear ear-right"></div>

            <div class="whiskers">
                <div class="whisker left-1"></div>
                <div class="whisker left-2"></div>
                <div class="whisker left-3"></div>
                <div class="whisker right-1"></div>
                <div class="whisker right-2"></div>
                <div class="whisker right-3"></div>
            </div>

            <h1>Dzień Dobry! <span class="paw-print">🐾</span></h1>

            <p>
                Pamiętaj, że cokolwiek się dzisiaj wydarzy – zawsze spadasz na cztery łapy!<br><br>
                Zjedz coś dobrego, zrób sobie małą drzemkę w słońcu i miej miau-spaniały dzień!
            </p>

            <div class="cat-face">(=^ ◡ ^=)</div>
        </div>

        <div class="yarn-ball" title="Kliknij i przytrzymaj by pociągnąć!"></div>
        <div class="yarn-string"></div>
    </div>

</body>
</html>
